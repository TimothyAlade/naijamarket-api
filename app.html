<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VoxFix App</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="app-box">

  <h2>Fix Your Message</h2>

  <textarea id="inputText" placeholder="Paste your rough message here..."></textarea>

  <select id="tone">
    <option>Professional</option>
    <option>Respectful</option>
    <option>Business</option>
    <option>Romantic</option>
    <option>Client Reply</option>
  </select>

  <button onclick="fixMessage()">Fix My Message</button>

  <div id="result"></div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>.
